<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Avito Text Bot</title>
</head>
<body class="bg-black text-white">
<div class="container-fluid">
    <div class="row">
        <div class="menu col-md-2 p-3 rounded bg-dark text-white">
            <h2 class="md-3">Menu</h2>
            <div class="btn-group-vertical w-100" role="group" aria-label="Vertical radio toggle button group">
                <input type="radio" class="btn-check" name="vbtn-radio" id="vbtn-radio1" autocomplete="off">
                <a href="/dashboard" class="btn btn-outline-secondary text-white w-100 py-3">Dash Board</a>
                <input type="radio" class="btn-check" name="vbtn-radio" id="vbtn-radio2" autocomplete="off">
                <a href="/users" class="btn btn-outline-secondary text-white w-100 py-3">Users</a>
                <input type="radio" class="btn-check" name="vbtn-radio" id="vbtn-radio3" autocomplete="off" checked>
                <a href="/payments" class="btn btn-outline-info text-white w-100 py-3">Payments</a>
                <input type="radio" class="btn-check" name="vbtn-radio" id="vbtn-radio4" autocomplete="off">
                <a href="/requests" class="btn btn-outline-secondary text-white w-100 py-3">Requests</a>
            </div>
        </div>

        <div class="content col-md-10">
            <h2 class="mt-2 text-center">Payments</h2>
            <h1 class="text-center">Developing</h1>

        </div>

    </div>
</div>

</body>
</html>
