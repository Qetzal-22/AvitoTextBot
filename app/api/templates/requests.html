<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Avito Text Bot</title>
</head>
<body class="bg-black text-white">
<div class="container-fluid">
    <div class="row">
        <div class="menu col-md-2 p-3 rounded bg-dark text-white">
            <h1 class="md-3">Menu</h1>
            <div class="btn-group-vertical w-100" role="group" aria-label="Vertical radio toggle button group">
                <input type="radio" class="btn-check" name="vbtn-radio" id="vbtn-radio1" autocomplete="off">
                <a href="/dashboard" class="btn btn-outline-secondary text-white w-100 py-3">Dash Board</a>
                <input type="radio" class="btn-check" name="vbtn-radio" id="vbtn-radio2" autocomplete="off">
                <a href="/users" class="btn btn-outline-secondary text-white w-100 py-3">Users</a>
                <input type="radio" class="btn-check" name="vbtn-radio" id="vbtn-radio3" autocomplete="off">
                <a href="/payments" class="btn btn-outline-secondary text-white w-100 py-3">Payments</a>
                <input type="radio" class="btn-check" name="vbtn-radio" id="vbtn-radio4" autocomplete="off" checked>
                <a href="/requests" class="btn btn-outline-info text-white w-100 py-3">Requests</a>
            </div>
        </div>

        <div class="content col-md-10">
            <h1 class="mt-2 text-center">Requests</h1>
            <table class="table table-dark table-hover mt-4">
                <thead>
                <tr>
                    <th scope="col"></th>
                    <th scope="col">ID</th>
                    <th scope="col">User ID</th>
                    <th scope="col">Request</th>
                    <th scope="col">Create at</th>
                </tr>
                </thead>
                <tbody>
                {% for key, request in requests %}
                <tr>

                    <th scope="row">{{ key }}</th>
                    <td>{{ request.id }}</td>
                    <td>{{ request.user_id }}</td>
                    <td>{{ request.request }}</td>
                    <td>{{ request.create_at }}</td>
                </tr>
                {% endfor %}

                </tbody>
            </table>

        </div>

    </div>
</div>

</body>
</html>
