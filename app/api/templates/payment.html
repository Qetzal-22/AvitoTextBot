<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Avito Text Bot</title>
</head>
<body class="bg-black text-white">
<div class="container-fluid">
    <div class="row">
        <div class="menu col-md-2 p-3 rounded bg-dark text-white">
            <h1 class="md-3">Menu</h1>
            <div class="btn-group-vertical w-100" role="group" aria-label="Vertical radio toggle button group">
                <input type="radio" class="btn-check" name="vbtn-radio" id="vbtn-radio1" autocomplete="off">
                <a href="/dashboard" class="btn btn-outline-secondary text-white w-100 py-3">Dash Board</a>
                <input type="radio" class="btn-check" name="vbtn-radio" id="vbtn-radio2" autocomplete="off">
                <a href="/users" class="btn btn-outline-secondary text-white w-100 py-3">Users</a>
                <input type="radio" class="btn-check" name="vbtn-radio" id="vbtn-radio3" autocomplete="off">
                <a href="/payments" class="btn btn-outline-secondary text-white w-100 py-3">Payments</a>
                <input type="radio" class="btn-check" name="vbtn-radio" id="vbtn-radio21" autocomplete="off" checked>
                <a class="btn btn-outline-info text-white w-75 py-1">Payment</a>
                <input type="radio" class="btn-check" name="vbtn-radio" id="vbtn-radio4" autocomplete="off">
                <a href="/requests" class="btn btn-outline-secondary text-white w-100 py-3">Requests</a>
            </div>
        </div>

        <div class="content col-md-10">
            <h1 class="text-center">Payment</h1>
            <div class="row g-4 mt-2">
                <div class="col-md-3">
                    <div class="bg-dark rounded border border-info p-3">
                        <h2>{{ payment.id }}</h2>
                        <p class="text-info">ID</p>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="bg-dark rounded border border-info p-3">
                        <h2>{{ payment.payload }}</h2>
                        <p class="text-info">Payload</p>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="bg-dark rounded border border-info p-3">
                        <h2>{{ payment.user_id }}</h2>
                        <p class="text-info">User ID</p>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="bg-dark rounded border border-info p-3 d-flex justify-content-between align-items-center">
                        <div>
                            <h2>{{ payment.status.value.upper() }}</h2>
                            <p class="text-info">Status</p>
                        </div>
                        <div>
                            <div class="dropdown">
                                <button class="btn btn-info dropdown-toggle" type="button"
                                        data-bs-toggle="dropdown" aria-expanded="false">
                                    Change status
                                </button>
                                <ul class="dropdown-menu bg-dark">
                                    <form method="post" action="/payments/edit-status">
                                        <input type="hidden" name="payment_id" value="{{ payment.id }}">
                                        <input type="hidden" name="status" value="success">
                                        <button class="dropdown-item text-white bg-dark">SUCCESS</button>
                                    </form>
                                    <form method="post" action="/payments/edit-status">
                                        <input type="hidden" name="payment_id" value="{{ payment.id }}">
                                        <input type="hidden" name="status" value="pending">
                                        <button class="dropdown-item text-white bg-dark">PENDING</button>
                                    </form>
                                    <form method="post" action="/payments/edit-status">
                                        <input type="hidden" name="payment_id" value="{{ payment.id }}">
                                        <input type="hidden" name="status" value="failed">
                                        <button class="dropdown-item text-white bg-dark">FAILED</button>
                                    </form>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="bg-dark rounded border border-info p-3 d-flex justify-content-between align-items-center">
                        <div>
                            <h2>{{ payment.plan.value.upper() }}</h2>
                            <p class="text-info">Product</p>
                        </div>
                        <div>
                            <div class="dropdown">
                                <button class="btn btn-info dropdown-toggle" type="button"
                                        data-bs-toggle="dropdown" aria-expanded="false">
                                    Change product
                                </button>
                                <ul class="dropdown-menu bg-dark">
                                    <form method="post" action="/payments/edit-product">
                                        <input type="hidden" name="payment_id" value="{{ payment.id }}">
                                        <input type="hidden" name="product" value="pro">
                                        <button class="dropdown-item text-white bg-dark">PRO</button>
                                    </form>
                                    <form method="post" action="/payments/edit-product">
                                        <input type="hidden" name="payment_id" value="{{ payment.id }}">
                                        <input type="hidden" name="product" value="premium">
                                        <button class="dropdown-item text-white bg-dark">PREMIUM</button>
                                    </form>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="bg-dark rounded border border-info p-3">
                        <h2>{{ payment.amount }}</h2>
                        <p class="text-info">Prise</p>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="bg-dark rounded border border-info p-3">
                        <h2>{{ payment.create_at }}</h2>
                        <p class="text-info">Create at</p>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
</body>
</html>
