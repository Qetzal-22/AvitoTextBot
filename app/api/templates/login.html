<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Avito Text Bot</title>
</head>
<body class="bg-black text-white">
<div class="container-fluid d-flex justify-content-center">
    <div class="logining-plane">
        <div class="bg-dark rounded p-4 vh-100 d-flex flex-column justify-content-center align-items-center vh-100">
            <h1 class="text-center">Login</h1>
            <form method="post" action="/login">
                <div class="row">
                    <div class="col-md-12">
                        <div class="input-group input-group-lg mt-4 text-light">
                            <span class="input-group-text" id="inputGroup-sizing-lg">Password</span>
                            <input type="password" class="form-control bg-dark text-light"
                                   aria-label="Sizing example input"
                                   aria-describedby="inputGroup-sizing-lg" name="password">

                            <button class="btn btn-info">
                                Login
                            </button>
                        </div>
                    </div>
                </div>

            </form>
            <p class="mt-5">AvitoTextBot</p>
        </div>
    </div>
</div>
</body>
</html>
