<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Avito Text Bot</title>
</head>
<body class="bg-black text-white">
<div class="container-fluid">
    <div class="logining-plane p-4 mt-5">
        <div class="bg-dark rounded p-4 h-100">
            <h1 class="text-center">Login</h1>
            <form method="post" action="/login">
                <div class="row">
                    <div class="col-md-10">
                        <div class="input-group input-group-lg mt-4">
                            <span class="input-group-text" id="inputGroup-sizing-lg">Password</span>
                            <input type="password" class="form-control bg-dark text-light"
                                   aria-label="Sizing example input"
                                   aria-describedby="inputGroup-sizing-lg" name="password">
                        </div>
                    </div>

                    <div class="col-md-2 mt-3">
                        <button class="btn btn-info mt-3 w-100">
                            Login
                        </button>
                    </div>
                </div>

            </form>
        </div>
    </div>
</div>
</body>
</html>
